<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title>mitskichi</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/favicon.png" type="image/png" />
</head>
<body>
<header>
    <div class="logo">mitskichi</div>
    <nav id="nav">
        <ul>
            <li><a href="https://github.com/mitskichi" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: none;">Github</a></li>
            <li><button id="music-toggle" style="background:none; border:none; color:inherit; cursor:pointer; font:inherit; padding:0;">Music: Muted</button></li>

        <div class="card">
            <a href="https://x.com/mitskichii" target="_blank" rel="noopener noreferrer" style="display: block; color: inherit; text-decoration: none;">

        <div class="card">

        <div class="card">

        <div class="card">

                <div class="card-badge">✿</div>
